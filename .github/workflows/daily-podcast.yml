name: Daily Podcast

on:
  schedule:
    # 04:30 UTC = 06:30 CEST (summer) / 05:30 CET (winter). GitHub Actions
    # cron is always UTC, so the local time drifts by an hour across DST.
    - cron: "30 4 * * *"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_APPLICATION_CREDENTIALS: credentials/service-account.json
      GOOGLE_OAUTH_TOKEN: credentials/token.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write Google credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > credentials/service-account.json
          printf '%s' "$GOOGLE_OAUTH_TOKEN_JSON" > credentials/token.json

      - name: Fetch topics
        run: python3 main.py --fetch-topics-only > /tmp/topics.json

      - name: Write script with Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set +e
          mkdir -p output
          DATE=$(date +%F)
          TARGET_CHARS=$(python3 -c "import yaml; c=yaml.safe_load(open('config.yaml')); print(round(c['podcast_length_minutes']*c.get('chars_per_minute',570)))")
          claude --version
          PROMPT="Du bist Autor eines deutschsprachigen News-Podcasts. Die heutigen Themen kommen als JSON-Array ueber stdin (Felder: title, summary, link, category, source_count, target_length). target_length ist die fuer dieses Thema vorgesehene Zeichenzahl im Sprechtext - diese Werte sind bereits nach Substanz der Quelle gewichtet (lange, ausfuehrliche Artikel bekommen hohes target_length, dünne Meldungen ein niedriges) und summieren sich auf die Ziel-Gesamtlaenge. Halte dich pro Thema ungefaehr an sein target_length (Toleranz ok, aber nicht durchgaengig kuerzer schreiben). Gliedere den Sprechtext so: 1. Kurzes Intro (Begruessung, knapper Ueberblick was kommt). 2. Themen mit niedrigem target_length (grob unter 500 Zeichen) in einem kompakten Kurznachrichten-Block abhandeln - je ein bis zwei Saetze, direkt hintereinander mit natuerlichen Uebergaengen (z.B. Kurz notiert, Ausserdem). Bleibt Fliesstext, keine Aufzaehlung. 3. Themen mit hoeherem target_length bekommen einen entsprechend laengeren, gut moderierten Absatz mit Hintergrund und Einordnung - je hoeher target_length, desto ausfuehrlicher. 4. Kurzes Outro. Die Reihenfolge innerhalb des Skripts darf sich am journalistischen Gewicht orientieren, nicht stur an der Eingabereihenfolge. Ziel-Gesamtlaenge ca. ${TARGET_CHARS} Zeichen (Summe aller target_length-Werte) - daran halten, nicht künstlich kuerzen. Reiner Fliesstext ohne Markdown, ohne Emojis, keine Regieanweisungen in Klammern. Gib NUR den fertigen Sprechtext aus, keine Erklaerung davor oder danach."
          cat /tmp/topics.json | claude -p "$PROMPT" --permission-mode dontAsk > "output/script_${DATE}.txt" 2> /tmp/claude_stderr.log
          CLAUDE_EXIT=$?
          echo "=== claude exit code: $CLAUDE_EXIT ==="
          echo "=== stderr ==="
          cat /tmp/claude_stderr.log
          echo "=== script length: $(wc -c < "output/script_${DATE}.txt") chars (target: ${TARGET_CHARS}) ==="
          echo "=== stdout (script file, first 1000 chars) ==="
          head -c 1000 "output/script_${DATE}.txt"
          echo
          exit $CLAUDE_EXIT

      - name: Synthesize and upload
        run: |
          DATE=$(date +%F)
          python3 main.py --script-file "output/script_${DATE}.txt"
