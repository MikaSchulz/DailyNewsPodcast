# Daily podcast config. Copy defaults are fine to start; tune later.

# When the cron / Task Scheduler job should fire (informational — the
# actual trigger lives in cron/Task Scheduler, see README.md).
schedule_time: "06:30"

# Category -> weight. Higher weight = proportionally more topics picked from
# that category. Weight <= 0 (or omitted) excludes the category. Must match
# keys under `feeds:` below. All overridable per run with --categories, see
# README.md.
categories:
  welt: 4        # Tagesgeschehen
  politik: 2
  wirtschaft: 3
  tech: 2
  security: 1
  sport: 1

# How many topics to pick in total, apportioned across categories by weight.
# Overridable per run with --num-topics.
num_topics: 18

# Target podcast length in minutes. Drives the script-writer's target
# character count (length * chars_per_minute). Overridable per run with
# --minutes.
podcast_length_minutes: 30

# Speaking pace used to derive the target character count from the length
# above. ~550-600 chars/minute is normal pace for German TTS voices.
chars_per_minute: 570

anthropic:
  model: "claude-sonnet-5"

tts:
  language_code: "de-DE"
  voice_name: "de-DE-Chirp3-HD-Achernar"
  speaking_rate: 1.0

drive:
  # ID of the target Drive folder (the long string in the folder's URL,
  # after .../folders/). Must be a folder your own (OAuth) Google account owns
  # or can see — Drive upload runs as you, not as the service account.
  folder_id: "1TulGllz85C6TKylSpcqthypUqT1alc7M"

output_dir: "output"

# RSS feeds per category. Free, no API key needed. All URLs below are
# live-tested and working. Comment out / delete sources you don't want;
# add more the same way. More sources per category just means a bigger
# pool to pick from, not more picked topics (that's num_topics + weight).
feeds:
  politik:
    - https://www.tagesschau.de/inland/index~rss2.xml
    - https://www.spiegel.de/politik/index.rss
    - https://newsfeed.zeit.de/politik/index
    - https://rss.sueddeutsche.de/rss/Politik
    - https://www.faz.net/rss/aktuell/politik/
    - http://netzpolitik.org/feed/          # digital policy/rights, German
  wirtschaft:
    - https://www.tagesschau.de/wirtschaft/index~rss2.xml
    - https://www.spiegel.de/wirtschaft/index.rss
    - https://rss.sueddeutsche.de/rss/Wirtschaft
    - https://www.wiwo.de/contentexport/feed/rss/schlagzeilen
    - https://www.handelsblatt.com/contentexport/feed/schlagzeilen
    - http://feeds2.feedburner.com/businessinsider   # English, international angle
    - http://fortune.com/feed/                       # English, international angle
  tech:
    - https://www.heise.de/rss/heise-atom.xml
    - https://rss.golem.de/rss.php?feed=RSS2.0
    - https://t3n.de/rss.xml
    - https://www.spiegel.de/netzwelt/index.rss
    - https://techcrunch.com/feed/           # English
    - https://www.theverge.com/rss/index.xml # English
    - http://feeds.wired.com/wired/index     # English
  welt:
    - https://www.tagesschau.de/ausland/index~rss2.xml
    - https://www.spiegel.de/ausland/index.rss
  sport:
    - https://www.tagesschau.de/sport/index~rss2.xml
    - https://www.spiegel.de/sport/index.rss
    - https://newsfeed.kicker.de/news/aktuell
  # Off by default (see categories: above) — set a weight > 0 to include.
  security:
    - https://krebsonsecurity.com/feed/
    - http://thehackernews.com/feeds/posts/default
    - https://www.ccc.de/de/rss/updates.rdf   # Chaos Computer Club, German
    - http://www.schneier.com/blog/index.rdf
    - http://www.theregister.co.uk/security/headlines.atom
    - https://www.wired.com/feed/security/rss
    - https://therecord.media/feed/
